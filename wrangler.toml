name = "bharat-ticker-cloudflare"
main = "src/index.js"
compatibility_date = "2025-06-01"
workers_dev = true

# Native scraper Worker — runs entirely on the FREE Workers plan. No containers,
# no Durable Objects, no origin. Fetches Groww/Tickertape (real-time) + Yahoo
# (historical) directly with plain `fetch`. See src/index.js for the latency
# contract (live = Groww/Tickertape only; Yahoo = historical only).

[observability]
enabled = true
