name = "bharat-ticker-cloudflare"
main = "src/index.js"
compatibility_date = "2025-06-01"
# nodejs_compat: required by the `postgres` driver used for the Hyperdrive PG path.
# Harmless when the binding is absent (the import just sits unused).
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# Native scraper Worker — runs on the FREE Workers plan. Fetches Groww/Tickertape
# (real-time) + Yahoo (historical) directly with plain `fetch`. See src/index.js
# for the latency contract (live = Groww/Tickertape; Yahoo = historical only).

# ── Hyperdrive → Northflank Postgres (sub-minute 1s store) ───────────────────
# Gives the edge Worker the real 500ms/1s/10s + deep intraday data from the NF
# `intraday_candles` table (pooled, query-cached, app-independent). FREE plan:
# 100k queries/day. INERT until configured — sub-minute requests fall back to the
# honest empty until then. TO ENABLE (you run; the connection string holds the PG
# password so do NOT commit it):
#   1. npx wrangler hyperdrive create bharat-pg \
#        --connection-string="postgres://USER:PASS@HOST:PORT/DB?sslmode=require"
#   2. paste the returned id below and uncomment this block
#   3. npx wrangler deploy
# [[hyperdrive]]
# binding = "PG"
# id = "<paste-hyperdrive-id-here>"

[observability]
enabled = true

# ── Cron warm-keeper ─────────────────────────────────────────────────────────
# Fires the scheduled() handler every 2 min; it self-gates to the IST market window
# and pre-warms the long-TTL edge cache (candles/fundamentals) for SB_WARM_SYMBOLS so
# those reads are HITs that skip the upstream scrape. Cron Triggers are free.
[triggers]
crons = ["*/2 * * * *"]

# Hot-list to keep warm (comma list, ≤8 effective per the 50-subreq/invocation cap).
# Override per deploy via the dashboard or by editing here. Empty = warmer is a no-op.
[vars]
SB_WARM_SYMBOLS = "RELIANCE,HDFCBANK,ICICIBANK,TCS,INFY,SBIN,BHARTIARTL,ITC"

# ── Second CF account (load-split mirror) ────────────────────────────────────
# Deploy the SAME src/index.js to a SECOND Cloudflare account so edge load is
# split across two free plans (each = its own 100k req/day quota fronting the one
# Northflank origin). ONE codebase → zero drift: this env only renames the Worker,
# everything above (main, compat flags, observability) is inherited.
#
# The TARGET ACCOUNT is chosen by the CREDENTIALS you deploy with, NOT by this
# file. To ship to account #2:
#   CLOUDFLARE_API_TOKEN=<acct#2 token> CLOUDFLARE_ACCOUNT_ID=<acct#2 id> \
#     npm run deploy:2
#   (token = SECRET, never commit. Create at dash.cloudflare.com → My Profile →
#    API Tokens → "Edit Cloudflare Workers" template, scoped to account #2.
#    account id is on that account's Workers & Pages overview — not secret.)
# Result URL: https://bharat-ticker-cf2.<acct#2-subdomain>.workers.dev
#   → put it in localhost env BHARAT_CLOUDFLARE_URL_2 to arm the 2nd edge.
[env.cf2]
name = "bharat-ticker-cf2"

[env.cf2.observability]
enabled = true

# Named environments do NOT inherit triggers/vars — repeat them for cf2.
[env.cf2.triggers]
crons = ["*/2 * * * *"]

[env.cf2.vars]
SB_WARM_SYMBOLS = "RELIANCE,HDFCBANK,ICICIBANK,TCS,INFY,SBIN,BHARTIARTL,ITC"
